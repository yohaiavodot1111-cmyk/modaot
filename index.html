<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גף פלדה כחולה · שלוחת אשקלון — לוח מודעות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Rubik:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A2A4E;
    --navy2:#061C36;
    --blue:#1C5FA8;
    --sky:#EDF2F8;
    --bg:#F5F7FA;
    --card:#FFFFFF;
    --line:#CBD6E2;
    --ink:#0F2138;
    --muted:#516480;
    --gold:#A8862F;
    --green:#2F6B4F;
    --red:#9E2B25;
    --r:.4vh;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Heebo',sans-serif; color:var(--ink); background:var(--bg);
    overflow:hidden; display:flex; flex-direction:column;
    -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
    cursor:none;
  }

  /* ================= כותרת עליונה ================= */
  header{
    flex:none; height:11vh; display:flex; align-items:center; justify-content:space-between;
    padding:0 2.2vw; color:#fff; background:var(--navy);
    border-bottom:2px solid var(--gold);
  }
  .brand{display:flex; align-items:center; gap:1.2vw}
  .roundel{width:7vh; height:7vh; flex:none}
  .brand h1{font-family:'Rubik'; font-weight:700; font-size:3.6vh; letter-spacing:.02em}
  .brand .sub{font-size:2.1vh; font-weight:500; opacity:.85; margin-top:.3vh; letter-spacing:.08em}
  .timeblock{text-align:left}
  .clock{
    font-weight:600; font-size:6.4vh; line-height:1;
    font-variant-numeric:tabular-nums; direction:ltr; letter-spacing:.02em;
  }
  .dates{font-size:2.2vh; font-weight:500; opacity:.9; margin-top:.4vh}
  .dates b{font-weight:700}

  /* פס התקדמות שקף */
  .progress{flex:none; height:.5vh; background:var(--line)}
  .progress i{display:block; height:100%; width:0; background:var(--navy)}
  .progress i.run{animation:fill var(--slide-sec) linear forwards}
  @keyframes fill{to{width:100%}}

  /* ================= אזור השקפים ================= */
  .stage{flex:1; position:relative; min-height:0}
  .slide{
    position:absolute; inset:0; padding:2.4vh 2.4vw; display:none;
    flex-direction:column; min-height:0;
  }
  .slide.on{display:flex; animation:slideIn .5s ease both}
  @keyframes slideIn{from{opacity:0} to{opacity:1}}

  .slide-title{display:flex; align-items:baseline; gap:1.2vw; margin-bottom:2vh; flex:none}
  .slide-title h2{font-family:'Rubik'; font-weight:700; font-size:4.4vh; color:var(--navy); letter-spacing:.01em}
  .slide-title .range{font-size:2.4vh; color:var(--muted); font-weight:600}
  .slide-title::after{content:""; flex:1; height:2px; background:var(--line); align-self:center}

  /* ---------- לו"ז היום ---------- */
  .today-list{flex:1; display:flex; flex-direction:column; gap:1.3vh; min-height:0}
  .today-row{
    display:flex; align-items:center; gap:1.4vw;
    background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:1.7vh 1.6vw;
  }
  .t-time{
    font-variant-numeric:tabular-nums; direction:ltr; font-weight:700; font-size:3.2vh;
    color:var(--navy); background:var(--sky); border-radius:var(--r); padding:.6vh 1.1vw;
    min-width:13ch; text-align:center; flex:none; border:1px solid var(--line);
  }
  .t-time .end{font-size:2.3vh; font-weight:500; color:var(--muted)}
  .t-what{font-size:3.2vh; font-weight:600}
  .t-note{font-size:2.2vh; color:var(--muted); font-weight:500; margin-inline-start:auto}
  .now-chip{
    display:none; font-size:2vh; font-weight:700; color:#fff; background:var(--gold);
    border-radius:var(--r); padding:.35vh 1.1vw; margin-inline-start:1vw; flex:none; letter-spacing:.05em;
  }
  .today-row.now{border-color:var(--gold); border-right:.6vh solid var(--gold); background:#FFFDF7}
  .today-row.now .t-time{background:var(--navy); color:#fff; border-color:var(--navy)}
  .today-row.now .t-time .end{color:#B9CCE2}
  .today-row.now .now-chip{display:inline-block}
  .today-row.past{opacity:.4}

  /* ---------- לו"ז שבועי ---------- */
  .daily-strip{
    flex:none; display:flex; align-items:center; gap:1vw; margin-bottom:1.5vh;
    background:var(--card); border:1px solid var(--line); border-right:.6vh solid var(--navy);
    border-radius:var(--r); padding:1.2vh 1.4vw; font-size:2.4vh; font-weight:500;
  }
  .daily-strip .lbl{font-weight:700; color:var(--navy); flex:none}
  .week-grid{flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:1vw; min-height:0}
  .day-col{
    background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .day-head{flex:none; text-align:center; padding:1.3vh 0 1.1vh; background:var(--navy); color:#fff}
  .day-head .dname{font-family:'Rubik'; font-weight:700; font-size:2.7vh}
  .day-head .ddate{font-size:2.1vh; font-weight:500; opacity:.85; direction:ltr}
  .day-col.today-col .day-head{background:var(--blue)}
  .day-col.today-col{border-color:var(--blue); border-width:2px}
  .day-items{flex:1; padding:1.3vh 1vw; display:flex; flex-direction:column; gap:1.1vh; overflow:hidden}
  .w-item .w-time{font-variant-numeric:tabular-nums; direction:ltr; display:inline-block; font-weight:700; color:var(--blue); font-size:2.2vh}
  .w-item .w-what{font-size:2.3vh; font-weight:600; line-height:1.3}
  .w-empty{color:var(--muted); font-weight:500; font-size:2.2vh; text-align:center; margin-top:2vh}
  .w-more{font-size:2vh; color:var(--muted); text-align:center; font-weight:500}

  /* ---------- חלוקת חנת"רים ---------- */
  .hantar-grid{
    flex:1; display:grid; grid-template-columns:1fr 1fr; gap:1.5vh 1.5vw;
    align-content:center; min-height:0;
  }
  .hantar{
    display:flex; align-items:center; gap:1.4vw;
    background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:2.1vh 1.8vw;
  }
  .hantar .cls{
    flex:none; font-family:'Rubik'; font-weight:700; font-size:2.9vh; color:#fff;
    background:var(--navy); border-radius:var(--r); padding:.9vh 1.4vw; min-width:12ch; text-align:center;
  }
  .hantar .who{font-size:3.3vh; font-weight:700}

  /* ---------- ימי הולדת ---------- */
  .bday-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2.5vh; min-height:0}
  .bday-lead{font-size:3vh; font-weight:600; color:var(--muted); letter-spacing:.03em}
  .bday-lead.today{color:var(--gold); font-weight:700}
  .bday-cards{display:flex; gap:2vw; flex-wrap:wrap; justify-content:center; max-width:92vw}
  .bday-card{
    background:var(--card); border:1px solid var(--line); border-top:.7vh solid var(--gold);
    border-radius:var(--r); padding:3vh 3vw; text-align:center; min-width:24vw;
  }
  .bday-name{font-family:'Rubik'; font-weight:700; font-size:4.6vh; color:var(--navy)}
  .bday-date{font-size:2.8vh; font-weight:600; color:var(--ink); margin-top:1vh; direction:ltr}
  .bday-when{font-size:2.4vh; font-weight:600; color:var(--gold); margin-top:1vh}
  .bday-icon{width:8vh; height:8vh; margin:0 auto 1vh}

  /* ---------- מזג אוויר ---------- */
  .weather-grid{flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:1.4vw; align-content:center; min-height:0}
  .wx-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    overflow:hidden; display:flex; flex-direction:column; text-align:center;
  }
  .wx-city{flex:none; background:var(--navy); color:#fff; font-family:'Rubik'; font-weight:700; font-size:3.2vh; padding:1.5vh 0}
  .wx-body{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1vh; padding:2.5vh 0}
  .wx-icon{width:9vh; height:9vh}
  .wx-temp{font-size:7.5vh; font-weight:600; line-height:1; direction:ltr; color:var(--navy)}
  .wx-desc{font-size:2.6vh; font-weight:600; color:var(--ink)}
  .wx-minmax{font-size:2.2vh; color:var(--muted); direction:ltr; font-weight:500}

  /* ---------- משפט שבועי ---------- */
  .quote-wrap{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--navy); border-radius:var(--r);
    color:#fff; text-align:center; padding:4vh 8vw;
  }
  .quote-rule{width:8vw; height:2px; background:var(--gold); flex:none}
  .quote-text{
    font-family:'Rubik'; font-weight:700; font-size:5.2vh; line-height:1.5; max-width:80vw;
    margin:3.5vh 0;
  }
  .quote-src{font-size:2.6vh; font-weight:500; color:#C4D3E4; letter-spacing:.08em; margin-top:2vh}

  /* ---------- משימות ---------- */
  .tasks-wrap{flex:1; display:grid; grid-template-columns:1fr 1fr; gap:1.5vw; min-height:0}
  .task-col{
    background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:2vh 1.6vw; display:flex; flex-direction:column; gap:1.4vh; overflow:hidden;
  }
  .task-col h3{
    font-family:'Rubik'; font-weight:700; font-size:2.9vh; color:var(--navy);
    padding-bottom:1vh; border-bottom:2px solid var(--line); flex:none;
  }
  .task{display:flex; align-items:center; gap:1vw; font-size:2.8vh}
  .task .box{
    width:3.2vh; height:3.2vh; flex:none; border-radius:var(--r);
    border:2.5px solid var(--navy); display:grid; place-items:center; background:#fff;
  }
  .task.done .box{background:var(--green); border-color:var(--green)}
  .task.done .box::after{content:"✓"; color:#fff; font-weight:800; font-size:2.3vh}
  .task.done .task-name{color:var(--muted); text-decoration:line-through}
  .task-name{flex:1; font-weight:600}
  .task-owner{font-size:2.1vh; color:var(--navy); background:var(--sky); border:1px solid var(--line); border-radius:var(--r); padding:.35vh 1vw; font-weight:600; white-space:nowrap}

  /* ---------- עדכונים ---------- */
  .updates-wrap{flex:1; display:flex; flex-direction:column; gap:1.4vh; min-height:0}
  .update{
    background:var(--card); border:1px solid var(--line); border-right:.6vh solid var(--navy);
    border-radius:var(--r); padding:1.9vh 1.6vw;
  }
  .update h3{font-size:3.1vh; font-weight:700; color:var(--navy); margin-bottom:.6vh}
  .update p{font-size:2.6vh; font-weight:500; line-height:1.5}
  .update .when{font-size:2.1vh; color:var(--muted); margin-top:.8vh; font-weight:500}
  .update.important{border-right-color:var(--red)}
  .update.important h3{color:var(--red)}

  .empty-big{flex:1; display:grid; place-items:center; color:var(--muted); font-size:3.2vh; font-weight:500}

  /* ================= תחתית ================= */
  .dots{flex:none; display:flex; justify-content:center; gap:.8vw; padding:1vh 0}
  .dots i{width:1.1vh; height:1.1vh; border-radius:50%; background:var(--line)}
  .dots i.on{background:var(--navy)}

  footer{flex:none; height:7vh; display:flex; align-items:stretch; background:var(--navy2); color:#fff}
  .ticker-label{
    display:flex; align-items:center; padding:0 1.8vw;
    background:var(--red); font-family:'Rubik'; font-weight:700; font-size:2.6vh;
    white-space:nowrap; z-index:2; letter-spacing:.04em;
  }
  .ticker-viewport{flex:1; overflow:hidden; display:flex; align-items:center; direction:ltr}
  .ticker-track{display:flex; white-space:nowrap; width:max-content; will-change:transform; backface-visibility:hidden; direction:ltr}
  .ticker-item{font-size:2.9vh; font-weight:600; padding:0 1.8vw; display:flex; align-items:center; flex:none}
  .ticker-item::after{content:""; width:1vh; height:1vh; background:var(--gold); margin-inline-start:1.8vw; flex:none; transform:rotate(45deg)}
  .status{
    display:flex; align-items:center; padding:0 1.2vw; font-size:1.8vh;
    color:#A8BBD1; white-space:nowrap; border-inline-start:1px solid rgba(255,255,255,.12); font-weight:500;
  }
  .status .ok{color:#7BBF97} .status .err{color:#D98A83}

  /* כיסוי פתיחה — כניסה למסך מלא */
  #fsGate{
    position:fixed; inset:0; z-index:50; background:var(--navy2); color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3vh;
    cursor:pointer; text-align:center;
  }
  #fsGate .gate-roundel{width:16vh; height:16vh}
  #fsGate h2{font-family:'Rubik'; font-weight:700; font-size:4vh}
  #fsGate p{font-size:2.6vh; font-weight:500; color:#B9CCE2}
  #fsGate .key{background:#fff; color:var(--navy2); border-radius:var(--r); padding:.3vh 1.2vw; font-weight:700; font-family:'Rubik'}

  @media (prefers-reduced-motion:reduce){
    .slide.on{animation:none} .progress i.run{animation:none; width:100%}
  }
</style>
</head>
<body>

<div id="fsGate">
  <svg class="gate-roundel" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="46" fill="#fff"/>
    <circle cx="50" cy="50" r="46" fill="none" stroke="#1C5FA8" stroke-width="6"/>
    <path d="M50 22 L66 50 L34 50 Z M50 78 L34 50 L66 50 Z" fill="none" stroke="#0A2A4E" stroke-width="5" stroke-linejoin="round"/>
  </svg>
  <h2>גף פלדה כחולה · שלוחת אשקלון</h2>
  <p>לחץ במקום כלשהו להצגת הלוח במסך מלא</p>
</div>

<header>
  <div class="brand">
    <svg class="roundel" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="46" fill="#fff"/>
      <circle cx="50" cy="50" r="46" fill="none" stroke="#1C5FA8" stroke-width="6"/>
      <path d="M50 22 L66 50 L34 50 Z M50 78 L34 50 L66 50 Z" fill="none" stroke="#0A2A4E" stroke-width="5" stroke-linejoin="round"/>
    </svg>
    <div>
      <h1 id="unitName">גף פלדה כחולה</h1>
      <div class="sub" id="unitSub">חיל האוויר · שלוחת אשקלון</div>
    </div>
  </div>
  <div class="timeblock">
    <div class="clock" id="clock">--:--</div>
    <div class="dates"><b id="dayName"></b> · <span id="gregDate"></span> · <span id="hebDate"></span></div>
  </div>
</header>

<div class="progress"><i id="progressBar"></i></div>
<div class="stage" id="stage"></div>
<div class="dots" id="dots"></div>

<footer>
  <div class="ticker-label">מבזקים · ynet</div>
  <div class="ticker-viewport" id="tickerViewport"><div class="ticker-track" id="ticker"></div></div>
  <div class="status" id="status">מתחבר…</div>
</footer>

<script>
/* ================== הגדרות ================== */
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbwk4LcVzrfZyVK7-eupi6LejAhEYM7Jgs4fpGoaP1WBFxtvkr8g6jl4I4Qlt4itON9pfA/exec",
  UNIT_NAME: "גף פלדה כחולה",
  UNIT_SUB: "חיל האוויר · שלוחת אשקלון",
  SLIDE_SEC: 18,
  REFRESH_SEC: 60,
  TICKER_SPEED: 80,          // פיקסלים לשנייה
  DEFAULT_DURATION_MIN: 60,  // אורך ברירת מחדל למשימה בלי שעת סיום
  MAX_TODAY: 7,
  MAX_PER_DAY: 5,
  MAX_UPDATES: 3,
  MAX_BDAY: 3,
  RELOAD_HOUR: 3
};

const DAY_NAMES = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const MONTHS_HE = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

/* נתוני הדגמה — מוצגים רק כשאין API_URL */
const DEMO_DATA = {
  schedule: [
    {day:"כל יום", time:"08:30", end:"09:00", what:"ישיבת בוקר", note:"חדר ישיבות"},
    {day:"רביעי", time:"10:00", end:"11:00", what:"ביקורת מפקד הגף", note:"נוכחות מלאה"}
  ],
  hantarim: [{cls:"כיתה ט׳3", who:"שם החנת״ר"},{cls:"מכללה", who:"שם החנת״ר"}],
  birthdays: [{name:"דנה לוי", day:new Date().getDate(), month:new Date().getMonth()+1, year:2006}],
  tasks: [{name:"עדכון מצבת נוכחות", freq:"יומי", owner:"תורן", done:true}],
  updates: [{title:"התרמת דם", body:"ביום חמישי 09:00–13:00.", date:"12.07"}],
  weather: [{city:"אשקלון", temp:29, code:0, min:24, max:31},{city:"חיפה", temp:28, code:2, min:25, max:30},{city:"באר שבע", temp:33, code:0, min:22, max:36}],
  quote: {text:"משפט השבוע יופיע כאן", source:"שלוחת אשקלון"},
  news: [{text:"כאן יופיעו מבזקים אמיתיים מ-ynet"},{text:"הראנר מתעדכן אוטומטית"}]
};

/* ================== שעון ותאריך ================== */
const hebDateFmt = new Intl.DateTimeFormat("he-IL-u-ca-hebrew", {day:"numeric", month:"long", year:"numeric"});
const p = x => String(x).padStart(2,"0");
function tickClock(){
  const n = new Date();
  document.getElementById("clock").textContent = `${p(n.getHours())}:${p(n.getMinutes())}`;
  document.getElementById("dayName").textContent = "יום " + DAY_NAMES[n.getDay()];
  document.getElementById("gregDate").textContent = `${p(n.getDate())}.${p(n.getMonth()+1)}.${n.getFullYear()}`;
  document.getElementById("hebDate").textContent = hebDateFmt.format(n);
}
setInterval(tickClock, 1000); tickClock();

/* ================== עזרים ================== */
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const byTime = (a,b) => String(a.time).localeCompare(String(b.time));
const toMin = t => { const m=/^(\d{1,2}):(\d{2})/.exec(t||""); return m ? +m[1]*60 + +m[2] : null; };
function weekDates(){
  const n = new Date();
  const shift = (n.getDay() >= 5) ? 7 : 0;
  const sunday = new Date(n); sunday.setDate(n.getDate() - n.getDay() + shift);
  return Array.from({length:5}, (_,i)=>{ const d=new Date(sunday); d.setDate(sunday.getDate()+i); return d; });
}
const fmtShort = d => `${p(d.getDate())}.${p(d.getMonth()+1)}`;
const sameDay = (a,b) => a.toDateString() === b.toDateString();

function wxInfo(code){
  const icons = {
    sun:   '<circle cx="32" cy="32" r="12" fill="none" stroke="#A8862F" stroke-width="4"/><g stroke="#A8862F" stroke-width="4" stroke-linecap="round"><line x1="32" y1="7" x2="32" y2="14"/><line x1="32" y1="50" x2="32" y2="57"/><line x1="7" y1="32" x2="14" y2="32"/><line x1="50" y1="32" x2="57" y2="32"/><line x1="14" y1="14" x2="19" y2="19"/><line x1="45" y1="45" x2="50" y2="50"/><line x1="50" y1="14" x2="45" y2="19"/><line x1="19" y1="45" x2="14" y2="50"/></g>',
    partly:'<circle cx="24" cy="23" r="9" fill="none" stroke="#A8862F" stroke-width="4"/><path d="M20 47a10 10 0 0 1 1-20 13 13 0 0 1 25 3 8 8 0 0 1-1 17Z" fill="#fff" stroke="#1C5FA8" stroke-width="3.5"/>',
    cloud: '<path d="M18 48a11 11 0 0 1 1-22 15 15 0 0 1 29 4 9 9 0 0 1-2 18Z" fill="none" stroke="#1C5FA8" stroke-width="4"/>',
    rain:  '<path d="M18 40a11 11 0 0 1 1-22 15 15 0 0 1 29 4 9 9 0 0 1-2 18Z" fill="none" stroke="#1C5FA8" stroke-width="4"/><g stroke="#1C5FA8" stroke-width="4" stroke-linecap="round"><line x1="22" y1="47" x2="19" y2="56"/><line x1="34" y1="47" x2="31" y2="56"/><line x1="46" y1="47" x2="43" y2="56"/></g>',
    storm: '<path d="M18 38a11 11 0 0 1 1-22 15 15 0 0 1 29 4 9 9 0 0 1-2 18Z" fill="none" stroke="#1C5FA8" stroke-width="4"/><path d="M34 38 26 50h7l-4 10 12-14h-7l4-8Z" fill="none" stroke="#A8862F" stroke-width="3.5" stroke-linejoin="round"/>',
    fog:   '<g stroke="#516480" stroke-width="4" stroke-linecap="round"><line x1="12" y1="26" x2="52" y2="26"/><line x1="16" y1="36" x2="48" y2="36"/><line x1="12" y1="46" x2="52" y2="46"/></g>'
  };
  let icon="sun", desc="בהיר";
  if(code===1||code===2){icon="partly"; desc="מעונן חלקית";}
  else if(code===3){icon="cloud"; desc="מעונן";}
  else if(code===45||code===48){icon="fog"; desc="ערפל";}
  else if(code>=51&&code<=57){icon="rain"; desc="טפטוף";}
  else if((code>=61&&code<=67)||(code>=80&&code<=82)){icon="rain"; desc="גשום";}
  else if(code>=95){icon="storm"; desc="סופות רעמים";}
  return {svg:`<svg class="wx-icon" viewBox="0 0 64 64">${icons[icon]}</svg>`, desc};
}

/* ================== בניית שקפים ================== */
function endMinOf(r){
  const s = toMin(r.time);
  const e = toMin(r.end);
  if(e!==null && s!==null && e>s) return e;
  if(s!==null) return s + CONFIG.DEFAULT_DURATION_MIN;
  return null;
}

function slideToday(data){
  const today = DAY_NAMES[new Date().getDay()];
  let rows = (data.schedule||[]).filter(r => r.day===today || r.day==="כל יום").sort(byTime);
  if(!rows.length) return `<div class="slide-title"><h2>לו״ז היום</h2><span class="range">יום ${today}</span></div>
    <div class="empty-big">אין פעילויות מתוכננות להיום</div>`;
  const extra = rows.length - CONFIG.MAX_TODAY;
  rows = rows.slice(0, CONFIG.MAX_TODAY);
  return `<div class="slide-title"><h2>לו״ז היום</h2><span class="range">יום ${today} · ${fmtShort(new Date())}</span></div>
    <div class="today-list">` +
    rows.map(r=>`<div class="today-row" data-start="${toMin(r.time) ?? ""}" data-end="${endMinOf(r) ?? ""}">
        <span class="t-time">${esc(r.time)}${r.end?`<span class="end"> – ${esc(r.end)}</span>`:""}</span>
        <span class="t-what">${esc(r.what)}</span>
        <span class="now-chip">מתקיים עכשיו</span>
        ${r.note ? `<span class="t-note">${esc(r.note)}</span>` : ""}
      </div>`).join("") +
    (extra>0 ? `<div class="w-more">+ עוד ${extra} פעילויות</div>` : "") +
    `</div>`;
}

/* מסמן "עכשיו"/"עבר" לפי שעת התחלה וסיום — בלי לבנות מחדש */
function markNow(){
  const rows = [...document.querySelectorAll(".today-row")];
  if(!rows.length) return;
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  rows.forEach(el=>{
    const s = el.dataset.start==="" ? null : +el.dataset.start;
    const e = el.dataset.end==="" ? null : +el.dataset.end;
    const isNow  = s!==null && e!==null && nowMin>=s && nowMin<e;
    const isPast = e!==null && nowMin>=e;
    el.classList.toggle("now", isNow);
    el.classList.toggle("past", isPast && !isNow);
  });
}

function slideWeek(data){
  const dates = weekDates();
  const range = `${fmtShort(dates[0])} – ${fmtShort(dates[4])}`;
  const daily = (data.schedule||[]).filter(r => r.day==="כל יום").sort(byTime);
  const now = new Date();
  const cols = dates.map((d,i)=>{
    const dn = DAY_NAMES[i];
    let items = (data.schedule||[]).filter(r => r.day===dn).sort(byTime);
    const extra = items.length - CONFIG.MAX_PER_DAY;
    items = items.slice(0, CONFIG.MAX_PER_DAY);
    return `<div class="day-col ${sameDay(d,now)?"today-col":""}">
      <div class="day-head"><div class="dname">${dn}</div><div class="ddate">${fmtShort(d)}</div></div>
      <div class="day-items">` +
      (items.length
        ? items.map(r=>`<div class="w-item"><span class="w-time">${esc(r.time)}</span> <span class="w-what">${esc(r.what)}</span></div>`).join("")
        : `<div class="w-empty">—</div>`) +
      (extra>0 ? `<div class="w-more">+ ${extra} נוספים</div>` : "") +
      `</div></div>`;
  }).join("");
  return `<div class="slide-title"><h2>לו״ז שבועי</h2><span class="range">${range}</span></div>` +
    (daily.length ? `<div class="daily-strip"><span class="lbl">קבוע בכל יום:</span>
      <span>${daily.map(r=>`${esc(r.time)} ${esc(r.what)}`).join("  ·  ")}</span></div>` : "") +
    `<div class="week-grid">${cols}</div>`;
}

function slideHantarim(data){
  const rows = data.hantarim||[];
  if(!rows.length) return null;
  return `<div class="slide-title"><h2>חלוקת חנת״רים</h2><span class="range">שלוחת אשקלון</span></div>
    <div class="hantar-grid">` +
    rows.map(h=>`<div class="hantar"><span class="cls">${esc(h.cls)}</span><span class="who">${esc(h.who)}</span></div>`).join("") +
    `</div>`;
}

const cakeSVG = '<svg class="bday-icon" viewBox="0 0 64 64"><g fill="none" stroke="#A8862F" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"><path d="M12 40h40v14H12z"/><path d="M12 40c0-6 5-8 20-8s20 2 20 8"/><line x1="24" y1="20" x2="24" y2="30"/><line x1="32" y1="16" x2="32" y2="30"/><line x1="40" y1="20" x2="40" y2="30"/><circle cx="24" cy="17" r="2" fill="#A8862F"/><circle cx="32" cy="13" r="2" fill="#A8862F"/><circle cx="40" cy="17" r="2" fill="#A8862F"/></g></svg>';

function slideBirthday(data){
  const list = (data.birthdays||[]).filter(b=>b.name && b.day && b.month);
  if(!list.length) return null;
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const withNext = list.map(b=>{
    let d = new Date(now.getFullYear(), b.month-1, b.day);
    if(d < today0) d = new Date(now.getFullYear()+1, b.month-1, b.day);
    const diff = Math.round((d - today0)/86400000);
    const age = b.year ? d.getFullYear() - b.year : null;
    return {...b, diff, age};
  });
  const minDiff = Math.min(...withNext.map(b=>b.diff));
  const soon = withNext.filter(b=>b.diff===minDiff).slice(0, CONFIG.MAX_BDAY);
  const isToday = minDiff===0;
  const lead = isToday
    ? `<div class="bday-lead today">מזל טוב! היום חוגגים יום הולדת</div>`
    : `<div class="bday-lead">יום ההולדת הקרוב${soon.length>1?"":""} — בעוד ${minDiff} ימים</div>`;
  const cards = soon.map(b=>{
    const whenTxt = isToday
      ? (b.age ? `חוגג/ת גיל ${b.age}` : "היום!")
      : `${b.day} ב${MONTHS_HE[b.month-1]}${b.age?` · גיל ${b.age}`:""}`;
    return `<div class="bday-card">
      ${cakeSVG}
      <div class="bday-name">${esc(b.name)}</div>
      <div class="bday-date">${p(b.day)}.${p(b.month)}</div>
      <div class="bday-when">${whenTxt}</div>
    </div>`;
  }).join("");
  return `<div class="slide-title"><h2>ימי הולדת</h2><span class="range">שלוחת אשקלון</span></div>
    <div class="bday-wrap">${lead}<div class="bday-cards">${cards}</div></div>`;
}

function slideWeather(data){
  const rows = data.weather||[];
  if(!rows.length) return null;
  return `<div class="slide-title"><h2>מזג האוויר</h2><span class="range">עדכון שוטף</span></div>
    <div class="weather-grid">` +
    rows.map(w=>{
      const info = wxInfo(w.code);
      return `<div class="wx-card">
        <div class="wx-city">${esc(w.city)}</div>
        <div class="wx-body">${info.svg}
          <div class="wx-temp">${Math.round(w.temp)}°</div>
          <div class="wx-desc">${info.desc}</div>
          <div class="wx-minmax">${Math.round(w.min)}° / ${Math.round(w.max)}°</div>
        </div></div>`;
    }).join("") + `</div>`;
}

function slideQuote(data){
  const q = data.quote;
  if(!q || !q.text) return null;
  return `<div class="quote-wrap">
    <div class="quote-rule"></div>
    <div class="quote-text">${esc(q.text)}</div>
    <div class="quote-rule"></div>
    ${q.source ? `<div class="quote-src">${esc(q.source)}</div>` : ""}
  </div>`;
}

function slideTasks(data){
  const rows = data.tasks||[];
  if(!rows.length) return null;
  const col = (title, list) => `<div class="task-col"><h3>${title}</h3>` +
    (list.length ? list.map(t=>`<div class="task ${t.done?"done":""}">
      <span class="box"></span><span class="task-name">${esc(t.name)}</span>
      ${t.owner?`<span class="task-owner">${esc(t.owner)}</span>`:""}
    </div>`).join("") : `<div class="w-empty">אין משימות</div>`) + `</div>`;
  return `<div class="slide-title"><h2>משימות</h2></div>
    <div class="tasks-wrap">${col("משימות יומיות", rows.filter(t=>t.freq==="יומי"))}${col("משימות שבועיות", rows.filter(t=>t.freq!=="יומי"))}</div>`;
}

function slideUpdates(data){
  const rows = (data.updates||[]).slice(0, CONFIG.MAX_UPDATES);
  if(!rows.length) return null;
  return `<div class="slide-title"><h2>עדכונים</h2></div>
    <div class="updates-wrap">` +
    rows.map(u=>`<div class="update ${u.important?"important":""}">
      <h3>${esc(u.title)}</h3><p>${esc(u.body)}</p>
      ${u.date?`<div class="when">${esc(u.date)}</div>`:""}
    </div>`).join("") + `</div>`;
}

/* ================== מנוע השקפים ================== */
let slides = [], slideIdx = 0, slideTimer = null;
const stage = document.getElementById("stage");

function buildSlides(data){
  const defs = [
    slideToday(data), slideWeek(data), slideHantarim(data), slideBirthday(data),
    slideTasks(data), slideUpdates(data), slideWeather(data), slideQuote(data)
  ].filter(Boolean);
  const keepIdx = Math.min(slideIdx, defs.length-1);
  stage.innerHTML = defs.map(h=>`<section class="slide">${h}</section>`).join("");
  slides = [...stage.children];
  document.getElementById("dots").innerHTML = slides.map((_,i)=>`<i class="${i===keepIdx?"on":""}"></i>`).join("");
  markNow();
  showSlide(keepIdx);
}
function showSlide(i){
  slideIdx = i;
  slides.forEach((s,j)=>s.classList.toggle("on", j===i));
  [...document.getElementById("dots").children].forEach((d,j)=>d.classList.toggle("on", j===i));
  const bar = document.getElementById("progressBar");
  bar.classList.remove("run"); void bar.offsetWidth;
  bar.style.setProperty("--slide-sec", CONFIG.SLIDE_SEC+"s");
  bar.classList.add("run");
}
function startLoop(){
  clearInterval(slideTimer);
  slideTimer = setInterval(()=>{ showSlide((slideIdx+1)%slides.length); }, CONFIG.SLIDE_SEC*1000);
}
setInterval(markNow, 30000);

/* ================== ראנר — מנוע רציף, לעולם לא ריק ==================
   - התוכן משוכפל עד שרוחב המסלול ≥ פעמיים רוחב החלון + יחידה, כך שתמיד
     יש טקסט על כל רוחב המסך
   - התנועה נעשית בלולאה של יחידה אחת (modulo), כך שנקודת החזרה זהה לתוכן
     שלפניה → אין קפיצה ואין רגע ריק
   - מבוסס requestAnimationFrame לפי זמן אמת; פריים שהוחמץ לא גורם לזינוק */
const tickerEl = document.getElementById("ticker");
const tickerVp = document.getElementById("tickerViewport");
const T = { raf:0, unitW:0, pos:0, lastT:0, running:false, items:[] };

function renderTicker(items){ T.items = items||[]; buildTickerDOM(); }

function buildTickerDOM(){
  if(!T.items.length){ tickerEl.innerHTML=""; stopTicker(); return; }
  const unit = T.items.map(n=>`<span class="ticker-item" dir="rtl">${esc(n.text)}</span>`).join("");
  tickerEl.style.transform = "translate3d(0,0,0)";
  tickerEl.innerHTML = unit;                       // מדידה של יחידה בודדת
  const unitW = tickerEl.scrollWidth;
  if(!unitW){ setTimeout(buildTickerDOM, 300); return; }  // עוד אין פריסה — ננסה שוב
  const copies = Math.max(3, Math.ceil((tickerVp.clientWidth*2 + unitW) / unitW) + 1);
  tickerEl.innerHTML = unit.repeat(copies);
  T.unitW = unitW;
  if(T.pos > unitW) T.pos = 0;
  tickerEl.style.transform = `translate3d(${(T.pos - unitW).toFixed(2)}px,0,0)`; // מצב פתיחה מלא, בלי הבהוב
  startTicker();
}
function startTicker(){ if(T.running) return; T.running=true; T.lastT=0; T.raf=requestAnimationFrame(stepTicker); }
function stopTicker(){ T.running=false; if(T.raf) cancelAnimationFrame(T.raf); T.raf=0; }
function stepTicker(t){
  if(!T.running) return;
  if(!T.lastT) T.lastT=t;
  let dt=(t-T.lastT)/1000; T.lastT=t;
  if(dt>0.25) dt=0;                    // פריים ארוך / חזרה מרדמת — בלי קפיצה
  T.pos += dt*CONFIG.TICKER_SPEED;
  if(T.pos>=T.unitW) T.pos-=T.unitW;   // לולאה על יחידה אחת → חזרה על תוכן זהה, בלי קפיצה
  /* תנועה ימינה: המסלול מוסט שמאלה ביחידה ומחליק חזרה ברצף */
  tickerEl.style.transform = `translate3d(${(T.pos - T.unitW).toFixed(2)}px,0,0)`;
  T.raf = requestAnimationFrame(stepTicker);
}
/* מדידה חוזרת אחרי טעינת פונטים ובשינוי גודל — בלי לחסום */
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>buildTickerDOM()); }
let resizeT=null;
window.addEventListener("resize", ()=>{ clearTimeout(resizeT); resizeT=setTimeout(buildTickerDOM, 400); });
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden){ T.lastT=0; startTicker(); } });

/* ================== משיכת נתונים — בנייה מחדש רק בשינוי ================== */
let lastDataKey = "", lastNewsKey = "";
async function refresh(){
  const status = document.getElementById("status");
  if(!CONFIG.API_URL){
    applyData(DEMO_DATA);
    status.innerHTML = 'מצב הדגמה — <span class="err">לא הוגדר API</span>';
    return;
  }
  try{
    const res = await fetch(CONFIG.API_URL, {redirect:"follow"});
    const data = await res.json();
    applyData(data);
    const n = new Date();
    status.innerHTML = `<span class="ok">●</span>&nbsp;עודכן ${p(n.getHours())}:${p(n.getMinutes())}`;
  }catch(e){
    status.innerHTML = '<span class="err">●</span>&nbsp;שגיאת חיבור — מציג נתונים אחרונים';
  }
}
function applyData(d){
  const dataKey = JSON.stringify([d.schedule, d.hantarim, d.birthdays, d.tasks, d.updates, d.weather, d.quote]);
  if(dataKey !== lastDataKey){ lastDataKey = dataKey; buildSlides(d); }
  const newsKey = JSON.stringify((d.news||[]).map(n=>n.text));
  if(newsKey !== lastNewsKey){ lastNewsKey = newsKey; renderTicker(d.news); }
}

/* ================== מסך מלא + נעילת העתקה ================== */
function goFullscreen(){
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if(fn) try{ fn.call(el); }catch(e){}
}
const gate = document.getElementById("fsGate");
function enterFromGate(){ goFullscreen(); gate.style.display="none"; }
gate.addEventListener("click", enterFromGate);
window.addEventListener("keydown", e=>{ if(gate.style.display!=="none"){ enterFromGate(); } }, {once:false});

/* מניעת בחירה/העתקה/תפריט הקשר/גרירה */
["contextmenu","selectstart","copy","cut","dragstart"].forEach(ev=>
  document.addEventListener(ev, e=>e.preventDefault()));
document.addEventListener("keydown", e=>{
  if((e.ctrlKey||e.metaKey) && ["c","x","a","s","p","u"].includes(e.key.toLowerCase())) e.preventDefault();
});

document.getElementById("unitName").textContent = CONFIG.UNIT_NAME;
document.getElementById("unitSub").textContent = CONFIG.UNIT_SUB;
refresh().then(startLoop);
setInterval(refresh, CONFIG.REFRESH_SEC*1000);
setInterval(()=>{ const n=new Date(); if(n.getHours()===CONFIG.RELOAD_HOUR && n.getMinutes()===0) location.reload(); }, 60000);
</script>
